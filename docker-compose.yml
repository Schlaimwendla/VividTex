services:
  vividtex:
    build: .
    container_name: vividtex
    restart: unless-stopped
    ports:
      - "3001:3001" # API + WebSocket
    env_file:
      - .env
    environment:
      - VIVIDTEX_WORKDIR=/app/workspace
    volumes:
      - /home/laim/workspace:/app/workspace
      - ./.env:/app/.env
    working_dir: /app
